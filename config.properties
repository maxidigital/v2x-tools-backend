# V2X.tools Configuration File
# Environment variables can be used with ${VAR_NAME:default_value} syntax

# Server Configuration
server.port=8080
server.web.enabled=true

# Telegram Monitoring Configuration  
telegram.bot.token=${TELEGRAM_BOT_TOKEN:}
telegram.chat.id=${TELEGRAM_CHAT_ID:}
telegram.enabled=${TELEGRAM_ENABLED:true}

# Monitoring Settings
monitoring.enabled=true
monitoring.api.notifications=true
monitoring.error.notifications=true
monitoring.status.notifications=true

# Rate Limiting for Monitoring
monitoring.rate.limit.per.window=10
monitoring.rate.limit.window.ms=60000

# Rate Limiting (for future use)
rate.limiting.enabled=false
rate.limiting.requests.per.minute=60
rate.limiting.window.minutes=1

# API Configuration
api.v2x.enabled=true
api.legacy.enabled=true

# Security Settings
security.path.validation=true
security.cors.enabled=true

# Logging Configuration
logging.level=INFO
logging.csv.enabled=true

# Performance Settings
performance.monitoring=true
performance.response.time.threshold=5000

# Development Settings
dev.mode=false
dev.debug.enabled=false