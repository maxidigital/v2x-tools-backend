server {
    listen 80;
    server_name v2x.tools www.v2x.tools;
    
    # Security headers for search engine protection
    add_header X-Robots-Tag "noindex, nofollow, noarchive, nosnippet" always;
    
    # Redirect all HTTP to HTTPS (will be uncommented after SSL setup)
    # return 301 https://$server_name$request_uri;
    
    # For now, proxy to the Java application
    location / {
        proxy_pass http://localhost:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        
        # Additional security headers
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "no-referrer" always;
    }
    
    # Serve robots.txt directly
    location = /robots.txt {
        root /home/ec2-user/apps/v2x.tools/web;
        add_header X-Robots-Tag "noindex, nofollow" always;
    }
    
    # Block access to hidden files
    location ~ /\. {
        deny all;
        return 404;
    }
}

