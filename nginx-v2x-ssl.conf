# HTTP redirect to HTTPS
server {
    listen 80;
    server_name v2x.tools www.v2x.tools;
    
    # Allow Let's Encrypt challenge
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }
    
    # Redirect all other traffic to HTTPS
    location / {
        return 301 https://$server_name$request_uri;
    }
}

# HTTPS server
server {
    listen 443 ssl http2;
    server_name v2x.tools www.v2x.tools;
    
    # SSL certificates
    ssl_certificate /etc/letsencrypt/live/v2x.tools/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/v2x.tools/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
    
    # Security headers for search engine protection
    add_header X-Robots-Tag "noindex, nofollow, noarchive, nosnippet" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    
    # Proxy to Java application
    location / {
        proxy_pass http://localhost:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
    
    # Serve robots.txt directly
    location = /robots.txt {
        root /home/ec2-user/apps/v2x.tools/web;
        add_header X-Robots-Tag "noindex, nofollow" always;
    }
    
    # Block access to hidden files
    location ~ /\. {
        deny all;
        return 404;
    }
}