server.port=8080

# Hub DB (Postgres). On Railway attach a Postgres plugin (provides PG* env vars).
spring.datasource.url=jdbc:postgresql://${PGHOST:localhost}:${PGPORT:5432}/${PGDATABASE:v2x_hub}
spring.datasource.username=${PGUSER:postgres}
spring.datasource.password=${PGPASSWORD:}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false

# V2X repo (HTTP). Local default; on Railway set WIND_REPO_URL to the repo's private address.
wind.repo.url=${WIND_REPO_URL:http://localhost:8081}

notification.service.url=${NOTIFICATION_SERVICE_URL:https://notification-service-1.up.railway.app}

# V2X engine service (HTTP). Local default; on Railway set WIND_ENGINE_URL to the engine's
# private address, e.g. http://v2x-tools-engine.railway.internal:8090 (fix the engine's PORT=8090).
wind.engine.url=${WIND_ENGINE_URL:http://localhost:8090}

monitoring.enabled=true
monitoring.rate.limit.per.window=10
monitoring.rate.limit.window.ms=60000
